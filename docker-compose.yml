# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml
# Orchestrates three services on a shared bridge network:
#   web        – FastAPI app (port 8000)
#   prometheus – Metrics collector (port 9090)
#   grafana    – Visualisation dashboard (port 3000)
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

networks:
  mlops-net:
    driver: bridge
    name: mlops-net

volumes:
  prometheus-data:
    name: prometheus-data
  grafana-data:
    name: grafana-data

services:

  # ── FastAPI Web Service ─────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: automated-real-time-audio-genre-classification-pipeline

    image: automated-real-time-audio-genre-classification-pipeline:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      # Persist generated artifacts (model.joblib + baseline.json) across rebuilds
      - ./app/artifacts:/api/app/artifacts:rw
    networks:
      - mlops-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8000"
      - "prometheus.path=/metrics"

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"        # allows POST /-/reload
      - "--log.level=info"
    networks:
      - mlops-net
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1",
             "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Default admin credentials (change in production)
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=mlops123
      # Auto-provision datasources and dashboards from mounted files
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      # Disable anonymous sign-in for security
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Allow embedding (useful for internal dashboards)
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - mlops-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1",
             "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
