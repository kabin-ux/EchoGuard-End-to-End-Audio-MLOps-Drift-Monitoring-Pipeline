# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
# CI pipeline for Audio Genre Classification API
#
# Triggers: every push + every pull request to main
#
# Jobs:
#   test  – Install deps, generate artifacts, run pytest with coverage
#   build – Build the Docker image (validates Dockerfile correctness)
# ─────────────────────────────────────────────────────────────────────────────

name: CI — Audio Genre Classification Pipeline

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: audio-genre-api

jobs:

  # ── Job 1: Lint + Unit Tests ───────────────────────────────────────────────
  test:
    name: Lint & Test Engine
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # ── System dependencies required by librosa / soundfile ───────────────
      - name: Install system audio libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libsndfile1 \
            ffmpeg

      # ── Python dependencies ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov ruff

      # ── Ruff linting (fast, replaces flake8 + isort) ─────────────────────
      - name: Run Ruff linter
        run: |
          ruff check app/ scripts/ test_main.py --select E,W,F,I \
            --ignore E501 \
            || true    # non-blocking: report issues but don't fail build yet

      # ── Generate artifacts needed by tests ────────────────────────────────
      - name: Generate model & baseline artifacts
        run: |
          python scripts/generate_artifacts.py

      # ── pytest ────────────────────────────────────────────────────────────
      - name: Run pytest with coverage
        run: |
          pytest test_main.py \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      # ── Upload coverage to GitHub artifact store ──────────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── Job 2: Docker Build Validation ────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test                # Only build if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: false           # Validation only; push to registry in deploy job
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Verify Docker image runs
        run: |
          docker run --rm \
            --name ci-test \
            -d -p 8000:8000 \
            ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          # Give the app 15 s to start, then hit the health endpoint
          sleep 15
          curl --retry 5 --retry-delay 3 --fail http://localhost:8000/health
          docker stop ci-test
