# monitoring/grafana/provisioning/dashboards/provider.yml
# ─────────────────────────────────────────────────────────────────────────────
# Tells Grafana where to find dashboard JSON files to auto-provision.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

providers:
  - name: "MLOps Dashboards"
    orgId: 1
    folder: "Audio ML Pipeline"   # Grafana folder label
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30      # Reload dashboard JSON every 30 s
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
